<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" role="img" aria-labelledby="title desc">
  <title id="title">HORO print detail proof card</title>
  <desc id="desc">A proof panel describing print texture and line fidelity for a HORO tee.</desc>
  <rect width="1200" height="1500" fill="#1a1a1a"/>
  <defs>
    <pattern id="weave" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#2c2a26"/>
      <path d="M0 12h24M12 0v24" stroke="#f5f0e8" stroke-opacity=".08" stroke-width="2"/>
    </pattern>
  </defs>
  <rect x="92" y="92" width="1016" height="1316" rx="48" fill="url(#weave)" stroke="#816a4f" stroke-width="6"/>
  <circle cx="600" cy="640" r="272" fill="#f5f0e8" fill-opacity=".96"/>
  <circle cx="600" cy="640" r="212" fill="#e8593c" fill-opacity=".18"/>
  <path d="M454 560c40-48 110-82 174-82 50 0 84 13 124 38 25 15 52 41 71 68-52-18-93-25-145-21-34 3-77 12-116 29-41 17-74 39-108 69 0-32 7-73 20-101 7-15 18-31 32-44Z" fill="#1a1a1a"/>
  <circle cx="852" cy="911" r="86" fill="#f5f0e8" stroke="#c4956a" stroke-width="14"/>
  <path d="m914 972 104 103" stroke="#c4956a" stroke-width="22" stroke-linecap="round"/>
  <g fill="#f5f0e8" font-family="Avenir Next, Segoe UI, Helvetica Neue, Arial, sans-serif">
    <text x="144" y="194" font-size="42" font-weight="600" letter-spacing="8">PRINT DETAIL</text>
    <text x="144" y="1186" font-size="34" font-weight="600" letter-spacing="2">What this proof card is checking</text>
    <text x="144" y="1252" font-size="28">Line sharpness, soft-hand finish, and color separation before the real macro photo lands.</text>
    <text x="144" y="1306" font-size="28">Use this only as a truthful stand-in for launch proof, not as fake photography.</text>
  </g>
</svg>
