name: Web CI

on:
  push:
    paths:
      - "web-next/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    paths:
      - "web-next/**"

defaults:
  run:
    working-directory: web-next

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck and lint
        run: |
          npm run type-check
          npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_SITE_URL: https://example.com
          NEXT_PUBLIC_MEDUSA_BACKEND_URL: https://example.com
          NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY: test_publishable_key
        run: npm run build
