<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1500" width="1200" height="1500">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700;800&amp;display=swap');
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500&amp;display=swap');
    </style>
    <filter id="orangeGlow">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feFlood flood-color="#FF4500" flood-opacity="0.35"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.06"/>
      </feComponentTransfer>
      <feComposite in2="SourceGraphic" operator="in"/>
    </filter>
  </defs>

  <!-- ========== BACKGROUND ========== -->
  <rect width="1200" height="1500" fill="#0B0B0B"/>
  <!-- Purple ambient blob top-left -->
  <circle cx="80" cy="120" r="200" fill="#1E0040" opacity="0.5"/>
  <!-- Purple accent top-right -->
  <circle cx="1140" cy="80" r="100" fill="#2A0055" opacity="0.35"/>

  <!-- ========== NAVIGATION ========== -->
  <g id="navigation">
    <text x="80" y="72" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#C0C0C0" letter-spacing="3">NEW ARRIVALS</text>
    <text x="290" y="72" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#C0C0C0" letter-spacing="3">COLLECTIONS</text>
    <text x="510" y="72" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#C0C0C0" letter-spacing="3">STORY</text>
    <text x="660" y="72" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#C0C0C0" letter-spacing="3">JOURNAL</text>
  </g>

  <!-- ========== "WEAR" - MASSIVE WHITE TEXT, LEFT SIDE ========== -->
  <!-- Slightly rotated counter-clockwise (~-6deg), each letter stacked vertically -->
  <!-- The letters are HUGE - each roughly 380px font-size, ultra condensed -->
  <g id="wear-text" transform="rotate(-6, 250, 750)">
    <text x="-80" y="420" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="420" fill="#DDD8D0" letter-spacing="-20" font-stretch="condensed">W</text>
    <text x="-55" y="780" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="420" fill="#DDD8D0" letter-spacing="-20" font-stretch="condensed">E</text>
    <text x="-30" y="1140" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="420" fill="#DDD8D0" letter-spacing="-20" font-stretch="condensed">A</text>
    <text x="-5" y="1480" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="400" fill="#DDD8D0" letter-spacing="-20" font-stretch="condensed">R</text>
    <!-- Grain texture overlay on white letters -->
    <rect x="-150" y="50" width="550" height="1500" filter="url(#grain)" opacity="0.3"/>
  </g>

  <!-- ========== "WHAT YOU MEAN" - MASSIVE ORANGE TEXT, RIGHT SIDE ========== -->
  <!-- Stacked: WH / AT / YOU / ME / AN, slight clockwise lean -->
  <g id="whatyoumean-text" filter="url(#orangeGlow)" transform="rotate(2, 900, 750)">
    <text x="680" y="320" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="300" fill="#FF4500" letter-spacing="-10" font-stretch="condensed">WH</text>
    <text x="660" y="580" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="300" fill="#FF4500" letter-spacing="-10" font-stretch="condensed">AT</text>
    <text x="640" y="840" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="300" fill="#FF4500" letter-spacing="-10" font-stretch="condensed">YOU</text>
    <text x="620" y="1100" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="300" fill="#FF4500" letter-spacing="-10" font-stretch="condensed">ME</text>
    <text x="600" y="1360" font-family="'Oswald', 'Impact', sans-serif" font-weight="700" font-size="300" fill="#FF4500" letter-spacing="-10" font-stretch="condensed">AN</text>
  </g>

  <!-- ========== MODEL SILHOUETTE - CENTER ========== -->
  <g id="model-figure" transform="translate(580, 180)">
    <!-- Head -->
    <ellipse cx="0" cy="50" rx="30" ry="36" fill="#1C1C1C"/>
    <!-- Braids/locs hanging down -->
    <line x1="-22" y1="60" x2="-38" y2="210" stroke="#1C1C1C" stroke-width="5" stroke-linecap="round"/>
    <line x1="-14" y1="65" x2="-30" y2="220" stroke="#1C1C1C" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="-6" y1="68" x2="-22" y2="230" stroke="#1C1C1C" stroke-width="4" stroke-linecap="round"/>
    <line x1="2" y1="68" x2="-14" y2="225" stroke="#1C1C1C" stroke-width="4.5" stroke-linecap="round"/>
    <line x1="10" y1="65" x2="-6" y2="215" stroke="#1C1C1C" stroke-width="5" stroke-linecap="round"/>
    <line x1="18" y1="60" x2="2" y2="210" stroke="#1C1C1C" stroke-width="4" stroke-linecap="round"/>
    <line x1="24" y1="55" x2="10" y2="200" stroke="#1C1C1C" stroke-width="4.5" stroke-linecap="round"/>

    <!-- Neck -->
    <rect x="-12" y="82" width="24" height="28" fill="#1C1C1C"/>

    <!-- T-SHIRT body -->
    <path d="M-75,110 L-65,110 Q-70,140 -68,200 L-65,320 L65,320 L68,200 Q70,140 65,110 L75,110 L82,130 L85,200 Q80,280 75,320 L65,320 L65,380 L-65,380 L-65,320 L-75,320 Q-80,280 -85,200 L-82,130 Z" fill="#2C2C2C"/>

    <!-- HORO text on shirt - upper -->
    <text x="0" y="230" font-family="'Oswald', sans-serif" font-weight="700" font-size="36" fill="#FF4500" text-anchor="middle" letter-spacing="4">HORO</text>

    <!-- Anubis/Egyptian icon on shirt -->
    <g transform="translate(0, 280)" opacity="0.85">
      <ellipse cx="0" cy="0" rx="28" ry="24" fill="#B8A040"/>
      <circle cx="0" cy="-5" r="5" fill="#FF4500"/>
      <!-- Simplified jackal ears -->
      <path d="M-12,-20 L-18,-50 L-2,-25 Z" fill="#B8A040"/>
      <path d="M12,-20 L18,-50 L2,-25 Z" fill="#B8A040"/>
    </g>

    <!-- HORO text on shirt - lower -->
    <text x="0" y="350" font-family="'Oswald', sans-serif" font-weight="700" font-size="28" fill="#FF4500" text-anchor="middle" letter-spacing="3">HORO</text>

    <!-- Left arm -->
    <path d="M-75,115 Q-95,180 -88,260 Q-82,320 -70,370" fill="none" stroke="#1C1C1C" stroke-width="22" stroke-linecap="round"/>
    <!-- Left hand -->
    <ellipse cx="-68" cy="375" rx="14" ry="16" fill="#1C1C1C"/>

    <!-- Right arm -->
    <path d="M75,115 Q95,180 88,260 Q82,320 70,370" fill="none" stroke="#2C2C2C" stroke-width="22" stroke-linecap="round"/>
    <!-- Right hand -->
    <ellipse cx="68" cy="375" rx="14" ry="16" fill="#1C1C1C"/>

    <!-- Bracelet on left wrist -->
    <rect x="-80" y="290" width="22" height="6" rx="3" fill="#888" opacity="0.5"/>

    <!-- CARGO PANTS -->
    <path d="M-60,380 L-65,600 L-72,800 Q-72,820 -60,820 L-25,820 Q-15,820 -15,800 L-10,600 L-5,430 L5,430 L10,600 L20,800 Q20,820 30,820 L65,820 Q75,820 75,800 L68,600 L60,380 Z" fill="#4E4E3E"/>
    <!-- Cargo pocket left -->
    <rect x="-68" y="560" width="30" height="40" rx="3" fill="#44442E" stroke="#5A5A44" stroke-width="1"/>
    <!-- Cargo pocket right -->
    <rect x="38" y="580" width="30" height="40" rx="3" fill="#44442E" stroke="#5A5A44" stroke-width="1"/>

    <!-- SNEAKERS -->
    <!-- Left shoe -->
    <path d="M-72,820 L-78,845 Q-80,865 -65,865 L-20,865 Q-8,865 -8,852 L-10,835 L-25,820 Z" fill="#222"/>
    <line x1="-68" y1="850" x2="-20" y2="850" stroke="#FF4500" stroke-width="2.5"/>
    <!-- Right shoe -->
    <path d="M30,820 L24,845 Q22,865 37,865 L82,865 Q94,865 94,852 L92,835 L75,820 Z" fill="#222"/>
    <line x1="34" y1="850" x2="82" y2="850" stroke="#FF4500" stroke-width="2.5"/>
  </g>

  <!-- ========== ACCENT PARTICLES ========== -->
  <circle cx="120" cy="240" r="4" fill="#FF4500" opacity="0.7"/>
  <circle cx="1145" cy="140" r="3.5" fill="#6B33CC" opacity="0.5"/>
  <circle cx="1080" cy="1350" r="3" fill="#FF4500" opacity="0.4"/>
  <circle cx="200" cy="1400" r="2.5" fill="#6B33CC" opacity="0.3"/>

  <!-- ========== BOTTOM LOGO ========== -->
  <g id="bottom-logo" transform="translate(600, 1460)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#FFFFFF" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="6" font-family="'Oswald', sans-serif" font-weight="700" font-size="16" fill="#FFFFFF" text-anchor="middle" opacity="0.5">H</text>
  </g>

  <!-- ========== SOCIAL ICONS (right edge) ========== -->
  <g id="social-icons" transform="translate(1160, 1300)" opacity="0.5">
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FF4500" stroke-width="1.2"/>
    <circle cx="0" cy="40" r="12" fill="none" stroke="#FF4500" stroke-width="1.2"/>
    <line x1="-6" y1="80" x2="6" y2="68" stroke="#FF4500" stroke-width="1.5"/>
    <line x1="6" y1="80" x2="-6" y2="68" stroke="#FF4500" stroke-width="1.5" opacity="0"/>
    <path d="M-4,76 L8,68" stroke="#FF4500" stroke-width="1.5"/>
  </g>
</svg>